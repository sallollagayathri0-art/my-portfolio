    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navigation -->
    <nav>
        <ul>
            <li><a href="#">Gmail</a></li>

            <li><span class="menu">&#8942;</span></li>
            <li><button class="signin">Sign In</button></li>

            <span class="blue">G</span>

            <span class="blue">g</span>
